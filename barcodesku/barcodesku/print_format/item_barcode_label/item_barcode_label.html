<style>
@media print {
    @page { margin: 10mm; }
    .no-print { display: none; }
}
.label-container {
    width: 85mm;
    min-height: 55mm;
    border: 1.5px solid #333;
    border-radius: 4px;
    padding: 8px 10px;
    display: inline-block;
    margin: 4px;
    font-family: Arial, sans-serif;
    page-break-inside: avoid;
    vertical-align: top;
}
.item-name {
    font-size: 11px;
    font-weight: bold;
    line-height: 1.3;
    margin-bottom: 4px;
    text-align: center;
    max-height: 30px;
    overflow: hidden;
}
.sku-line {
    font-size: 9px;
    color: #555;
    text-align: center;
    margin-bottom: 6px;
}
.barcode-wrap {
    text-align: center;
}
svg {
    max-width: 100%;
}
.barcode-text {
    font-size: 8px;
    letter-spacing: 1.5px;
    margin-top: 2px;
    font-family: monospace;
    text-align: center;
}
</style>

<!-- JsBarcode CDN for rendering - hidden on final print -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

{% set first_barcode = doc.barcodes[0].barcode if doc.barcodes else '' %}

<div class="label-container">
    <div class="item-name">{{ doc.item_name }}</div>
    {% if doc.custom_sku %}
    <div class="sku-line">SKU: {{ doc.custom_sku }}</div>
    {% endif %}
    {% if first_barcode %}
    <div class="barcode-wrap">
        <svg id="barcode-{{ doc.name | replace(' ', '_') | replace('-', '_') }}"></svg>
    </div>
    <div class="barcode-text">{{ first_barcode }}</div>
    <script>
        (function() {
            var el = document.getElementById("barcode-{{ doc.name | replace(' ', '_') | replace('-', '_') }}");
            if (el && typeof JsBarcode !== 'undefined') {
                try {
                    JsBarcode(el, "{{ first_barcode }}", {
                        format: "CODE128",
                        width: 1.5,
                        height: 45,
                        displayValue: false,
                        margin: 0
                    });
                } catch(e) {
                    el.parentNode.innerHTML = "<strong>{{ first_barcode }}</strong>";
                }
            }
        })();
    </script>
    {% else %}
    <div style="text-align:center; padding: 10px; color: #999; font-size: 10px;">No barcode on file</div>
    {% endif %}
</div>
